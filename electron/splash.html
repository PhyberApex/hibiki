<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hibiki</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeInScale 0.6s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0a0a0;
      margin-bottom: 3rem;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #7c9cf5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite, fadeInUp 0.6s ease-out 0.3s both;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <img src="splash-logo.png" alt="Hibiki Logo" class="logo">
  <h1>Hibiki</h1>
  <p class="subtitle">響 - Echoes of Adventure</p>
  <div class="spinner"></div>
</body>
</html>
