coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 1%
    patch:
      default:
        target: 60%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: backend
      paths:
        - app/src/
    - name: frontend
      paths:
        - app/frontend/src/

comment:
  layout: 'reach,diff,flags,tree'
  behavior: default
  require_changes: false
