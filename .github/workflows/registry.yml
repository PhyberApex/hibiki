name: Registry

on:
  pull_request:
    branches: [main]
    paths:
      - 'registry/scenes/**'
      - 'registry/schema/**'
      - 'registry/scripts/**'

jobs:
  validate:
    name: Validate and build index
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Validate registry entries
        run: node registry/scripts/validate.mjs

      - name: Build index.json
        run: node registry/scripts/build-index.mjs

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git diff --cached --quiet || git commit -m "chore: rebuild registry index"
          git push
