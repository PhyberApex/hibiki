name: Registry

on:
  push:
    branches: [main]
    paths:
      - 'registry/scenes/**'
      - 'registry/schema/**'
      - 'registry/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'registry/scenes/**'
      - 'registry/schema/**'
      - 'registry/scripts/**'

jobs:
  validate:
    name: Validate scene entries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Validate registry entries
        run: node registry/scripts/validate.mjs --check-urls

  build-index:
    name: Build index
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Build index.json
        run: node registry/scripts/build-index.mjs

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git diff --cached --quiet || git commit -m "chore: rebuild registry index"
          git push
