# E2E tests: build Hibiki, then run Playwright against the Electron app.
# Playwright launches the Electron app; no HTTP server needed.
#
# Note: The bot must connect to Discord's gateway. GitHub Actions runners can sometimes
# fail to reach Discord (timeouts, DNS, or network restrictions). If the bot never becomes
# ready, tests that require voice (join/leave) will be skipped.
#
# Required secrets: DISCORD_TOKEN
# Optional (for voice/sidecar tests): E2E_GUILD_ID, E2E_VOICE_CHANNEL_ID, E2E_SIDECAR_TOKEN

name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DISCORD_TOKEN }}" ]; then
            echo "::error::E2E workflow requires repository secret: DISCORD_TOKEN. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env for Hibiki
        run: |
          printf 'DISCORD_TOKEN=%s\n' "${{ secrets.DISCORD_TOKEN }}" >> .env

      - name: Build Hibiki
        run: pnpm run build

      - name: Install Playwright browsers (for Electron)
        run: pnpm --dir e2e exec playwright install chromium --with-deps

      - name: Create .env.e2e for tests
        run: |
          {
            [ -n "${{ secrets.E2E_GUILD_ID }}" ] && echo "E2E_GUILD_ID=${{ secrets.E2E_GUILD_ID }}"
            [ -n "${{ secrets.E2E_VOICE_CHANNEL_ID }}" ] && echo "E2E_VOICE_CHANNEL_ID=${{ secrets.E2E_VOICE_CHANNEL_ID }}"
            [ -n "${{ secrets.E2E_TEXT_CHANNEL_ID }}" ] && echo "E2E_TEXT_CHANNEL_ID=${{ secrets.E2E_TEXT_CHANNEL_ID }}"
            [ -n "${{ secrets.E2E_SIDECAR_TOKEN }}" ] && echo "E2E_SIDECAR_TOKEN=${{ secrets.E2E_SIDECAR_TOKEN }}"
          } > .env.e2e

      - name: Run E2E tests (Playwright + Electron)
        run: pnpm run test:e2e
