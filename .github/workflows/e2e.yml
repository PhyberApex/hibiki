# E2E tests: build & run Hibiki via Docker Compose, then run Vitest + Playwright e2e.
# Only one run at a time (concurrency). Env vars come from repo/organization secrets.
#
# Note: The bot must connect to Discord's gateway. GitHub Actions runners can sometimes
# fail to reach Discord (timeouts, DNS, or network restrictions). If the bot never becomes
# ready, check the "Hibiki logs" step output for connection errors; you may need to run
# E2E locally or use a self-hosted runner with Discord access.
#
# Required secrets (for Hibiki to start):
#   DISCORD_TOKEN, DISCORD_CLIENT_ID
# Optional (for full e2e including sidecar/Playwright):
#   HIBIKI_E2E_ALLOW_BOT_ID, E2E_SIDECAR_TOKEN, E2E_GUILD_ID, E2E_VOICE_CHANNEL_ID, E2E_TEXT_CHANNEL_ID

name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DISCORD_TOKEN }}" ] || [ -z "${{ secrets.DISCORD_CLIENT_ID }}" ]; then
            echo "::error::E2E workflow requires repository secrets: DISCORD_TOKEN, DISCORD_CLIENT_ID. Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Create .env for Hibiki
        run: |
          printf 'DISCORD_TOKEN=%s\n' "${{ secrets.DISCORD_TOKEN }}" >> .env
          printf 'DISCORD_CLIENT_ID=%s\n' "${{ secrets.DISCORD_CLIENT_ID }}" >> .env
          if [ -n "${{ secrets.HIBIKI_E2E_ALLOW_BOT_ID }}" ]; then
            printf 'HIBIKI_E2E_ALLOW_BOT_ID=%s\n' "${{ secrets.HIBIKI_E2E_ALLOW_BOT_ID }}" >> .env
          fi

      - name: Docker Compose up
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for Hibiki API and Discord connection
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/player/bot-status | grep -q '"ready":true'; then
              echo "Hibiki API and Discord bot ready"
              exit 0
            fi
            echo "Waiting for Hibiki API and Discord connection ($i/30)..."
            sleep 5
          done
          echo "Hibiki bot did not connect to Discord (API may be up but bot not ready)."
          echo "This can happen if GitHub Actions cannot reach Discord's gateway (e.g. network restrictions)."
          exit 1

      - name: Hibiki logs (on failure)
        if: failure()
        run: docker compose logs hibiki

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir e2e exec playwright install chromium --with-deps

      - name: Create .env.e2e for tests
        run: |
          {
            echo 'E2E_HIBIKI_API_URL=http://localhost:3000'
            [ -n "${{ secrets.E2E_GUILD_ID }}" ] && echo "E2E_GUILD_ID=${{ secrets.E2E_GUILD_ID }}"
            [ -n "${{ secrets.E2E_VOICE_CHANNEL_ID }}" ] && echo "E2E_VOICE_CHANNEL_ID=${{ secrets.E2E_VOICE_CHANNEL_ID }}"
            [ -n "${{ secrets.E2E_TEXT_CHANNEL_ID }}" ] && echo "E2E_TEXT_CHANNEL_ID=${{ secrets.E2E_TEXT_CHANNEL_ID }}"
            [ -n "${{ secrets.E2E_SIDECAR_TOKEN }}" ] && echo "E2E_SIDECAR_TOKEN=${{ secrets.E2E_SIDECAR_TOKEN }}"
          } > .env.e2e

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Docker Compose down
        if: always()
        run: docker compose down
