# E2E tests: build Hibiki, then run Playwright against the Electron app.
# Playwright launches the Electron app; no HTTP server needed.
#
# Note: The bot must connect to Discord's gateway. GitHub Actions runners can sometimes
# fail to reach Discord (timeouts, DNS, or network restrictions).
#
# Required secrets: DISCORD_TOKEN, E2E_GUILD_ID, E2E_VOICE_CHANNEL_ID, E2E_SIDECAR_TOKEN

name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      E2E_GUILD_ID: ${{ secrets.E2E_GUILD_ID }}
      E2E_VOICE_CHANNEL_ID: ${{ secrets.E2E_VOICE_CHANNEL_ID }}
      E2E_SIDECAR_TOKEN: ${{ secrets.E2E_SIDECAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$DISCORD_TOKEN" ] && missing+=("DISCORD_TOKEN")
          [ -z "$E2E_GUILD_ID" ] && missing+=("E2E_GUILD_ID")
          [ -z "$E2E_VOICE_CHANNEL_ID" ] && missing+=("E2E_VOICE_CHANNEL_ID")
          [ -z "$E2E_SIDECAR_TOKEN" ] && missing+=("E2E_SIDECAR_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            for s in "${missing[@]}"; do
              echo "::error::Missing required secret: $s. Add it in Settings > Secrets and variables > Actions."
            done
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            e2e/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        run: pnpm --dir e2e install --frozen-lockfile

      - name: Build Hibiki
        run: pnpm run build

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libgbm1 libasound2t64 libxss1 libnss3 \
            libatk1.0-0 libatk-bridge2.0-0 libdrm2 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 \
            libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 \
            libnspr4 libx11-6 libx11-xcb1 libxcb1 libxext6 \
            libatspi2.0-0 xvfb

      - name: Install Playwright browsers (for Electron)
        run: pnpm --dir e2e exec playwright install chromium --with-deps

      - name: Run E2E tests (Playwright + Electron)
        run: xvfb-run --auto-servernum pnpm run test:e2e
