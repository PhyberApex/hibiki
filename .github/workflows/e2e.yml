# E2E tests: build Hibiki, then run Playwright against the Electron app.
# Playwright launches the Electron app; no HTTP server needed.
#
# Note: The bot must connect to Discord's gateway. GitHub Actions runners can sometimes
# fail to reach Discord (timeouts, DNS, or network restrictions). If the bot never becomes
# ready, tests that require voice (join/leave) will be skipped.
#
# Required secrets: DISCORD_TOKEN, E2E_GUILD_ID, E2E_VOICE_CHANNEL_ID
# Optional secrets: E2E_TEXT_CHANNEL_ID, E2E_SIDECAR_TOKEN

name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      E2E_GUILD_ID: ${{ secrets.E2E_GUILD_ID }}
      E2E_VOICE_CHANNEL_ID: ${{ secrets.E2E_VOICE_CHANNEL_ID }}
      E2E_TEXT_CHANNEL_ID: ${{ secrets.E2E_TEXT_CHANNEL_ID }}
      E2E_SIDECAR_TOKEN: ${{ secrets.E2E_SIDECAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$DISCORD_TOKEN" ] && missing+=("DISCORD_TOKEN")
          [ -z "$E2E_GUILD_ID" ] && missing+=("E2E_GUILD_ID")
          [ -z "$E2E_VOICE_CHANNEL_ID" ] && missing+=("E2E_VOICE_CHANNEL_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            for s in "${missing[@]}"; do
              echo "::error::Missing required secret: $s. Add it in Settings > Secrets and variables > Actions."
            done
            exit 1
          fi
          [ -z "$E2E_SIDECAR_TOKEN" ] && echo "::notice::Optional secret E2E_SIDECAR_TOKEN not set — sidecar verification will be skipped"
          [ -z "$E2E_TEXT_CHANNEL_ID" ] && echo "::notice::Optional secret E2E_TEXT_CHANNEL_ID not set — text channel tests will be skipped"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            e2e/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        run: pnpm --dir e2e install --frozen-lockfile

      - name: Build Hibiki
        run: pnpm run build

      - name: Install Playwright browsers (for Electron)
        run: pnpm --dir e2e exec playwright install chromium --with-deps

      - name: Run E2E tests (Playwright + Electron)
        run: pnpm run test:e2e
