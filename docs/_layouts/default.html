<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ site.baseurl }}/logo.png" type="image/png">
  <style>
    :root {
      --bg: #0f0f12;
      --bg-card: #1a1a1f;
      --bg-code: #16161a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --text-dim: #71717a;
      --accent: #22d3ee;
      --accent-dim: #0891b2;
      --border: #27272a;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }
    .banner {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
      background: var(--bg-card);
    }
    .site-header {
      padding: 1.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .site-header .container {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .site-header .logo {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      border-radius: var(--radius);
    }
    .site-header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .site-header .tagline {
      margin: 0.35rem 0 0;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .page-content { padding: 2.5rem 0 3rem; }
    .page-content > .container { padding: 0 1.5rem; }
    main h2 {
      margin: 2.25rem 0 1rem;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
    }
    main h2:first-child { margin-top: 0; }
    main p {
      margin: 0 0 1rem;
      color: var(--text);
    }
    main p.lead {
      font-size: 1.06rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }
    main a {
      color: var(--accent);
      text-decoration: none;
    }
    main a:hover { text-decoration: underline; }
    main code {
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
      font-size: 0.9em;
      padding: 0.15em 0.4em;
      background: var(--bg-code);
      border-radius: 4px;
      color: var(--accent);
    }
    main pre,
    main .highlight pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow: auto;
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--text-muted);
    }
    main pre code {
      padding: 0;
      background: none;
      color: inherit;
    }
    main ul, main ol {
      margin: 0 0 1rem;
      padding-left: 1.5rem;
      color: var(--text);
    }
    main li { margin-bottom: 0.4rem; }
    main ul ul, main ol ol { margin: 0.25rem 0; }
    main .steps {
      list-style: none;
      padding-left: 0;
      counter-reset: step;
    }
    main .steps > li {
      counter-increment: step;
      margin-bottom: 1.25rem;
      padding-left: 2.75rem;
      position: relative;
    }
    main .steps > li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0.05rem;
      width: 1.6rem;
      height: 1.6rem;
      background: var(--accent);
      color: #0c1222;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    main .steps > li strong { display: block; margin-bottom: 0.25rem; }
    main .features {
      display: grid;
      gap: 1.25rem;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      margin: 1.25rem 0;
    }
    main .feature {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    main .feature h3 { margin: 0 0 0.5rem; font-size: 1rem; font-weight: 600; }
    main .feature p { margin: 0; font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }
    .cta {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: #0c1222;
      text-decoration: none;
      font-weight: 600;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .cta:hover { background: var(--accent-dim); text-decoration: none; color: #0c1222; }
    footer {
      padding: 2rem 1.5rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <img src="{{ site.baseurl }}/banner.png" alt="" class="banner" width="1200" height="220">
  <header class="site-header">
    <div class="container">
      <img src="{{ site.baseurl }}/logo.png" alt="" class="logo" width="48" height="48">
      <div>
        <h1>Hibiki</h1>
        <p class="tagline">{{ site.description }}</p>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Hibiki — MIT. <a href="https://github.com/phyberapex/hibiki">Source</a></p>
    </div>
  </footer>
</body>
</html>
