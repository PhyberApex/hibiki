<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ site.baseurl }}/favicon.jpg" type="image/jpeg">
  <style>
    :root {
      --bg: #0f0f12;
      --bg-card: #1c1c21;
      --bg-code: #16161a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --text-dim: #71717a;
      --accent: #22d3ee;
      --accent-dim: #0891b2;
      --border: #27272a;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }
    .hero {
      position: relative;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card) no-repeat center / cover;
      border-bottom: 1px solid var(--border);
    }
    .hero { background-image: url('{{ site.baseurl }}/banner.jpg'); }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(15,15,18,0.5) 0%, rgba(15,15,18,0.88) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 2rem;
    }
    .hero .logo {
      height: 72px;
      width: auto;
      border-radius: var(--radius);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0.4rem 0 0;
      color: var(--text-muted);
      font-size: 1.05rem;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.75rem;
    }
    main section {
      padding: 3.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    main section:last-of-type { border-bottom: none; }
    main h2 {
      margin: 0 0 1.25rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .lead {
      font-size: 1.08rem;
      line-height: 1.65;
      color: var(--text-muted);
      margin: 0 0 1.5rem;
    }
    main p {
      margin: 0 0 1rem;
      color: var(--text);
    }
    main p:last-child { margin-bottom: 0; }
    main a {
      color: var(--accent);
      text-decoration: none;
    }
    main a:hover { text-decoration: underline; }
    main code {
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
      font-size: 0.9em;
      padding: 0.15em 0.4em;
      background: var(--bg-code);
      border-radius: 4px;
      color: var(--accent);
    }
    .features {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .feature {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem;
    }
    .feature img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 0.85rem;
    }
    .feature h3 { margin: 0 0 0.4rem; font-size: 1.02rem; font-weight: 600; }
    .feature p { margin: 0; font-size: 0.9rem; color: var(--text-muted); line-height: 1.55; }
    .cta {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1.1rem;
      background: var(--accent);
      color: #0c1222;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .cta:hover { background: var(--accent-dim); text-decoration: none; color: #0c1222; }
    main .steps, main ol.steps {
      counter-reset: step;
      list-style: none;
      padding: 0;
      margin: 0 0 1.5rem;
    }
    main .steps li, main ol.steps li {
      counter-increment: step;
      margin-bottom: 1.5rem;
      padding-left: 3rem;
      position: relative;
    }
    main .steps li::before, main ol.steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0.1rem;
      width: 1.75rem;
      height: 1.75rem;
      background: var(--accent);
      color: #0c1222;
      border-radius: 50%;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    main .steps li strong { display: block; margin-bottom: 0.35rem; color: var(--text); }
    main .steps li p { margin: 0; color: var(--text-muted); font-size: 0.95rem; line-height: 1.65; }
    main .steps li p + .code { margin-top: 0.6rem; }
    main pre, main .code, main pre.highlight {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      overflow: auto;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
    main .code { margin: 0.5rem 0 1rem; }
    main pre code { padding: 0; background: none; color: inherit; }
    main ul { margin: 0 0 1rem; padding-left: 1.5rem; color: var(--text-muted); }
    main ul li { margin-bottom: 0.5rem; }
    footer {
      padding: 2.5rem 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-overlay">
      <img src="{{ site.baseurl }}/logo.jpg" alt="Hibiki" class="logo">
      <div>
        <h1>Hibiki</h1>
        <p>{{ site.description }}</p>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>Hibiki — MIT. <a href="https://github.com/phyberapex/hibiki">Source</a></p>
    </div>
  </footer>
</body>
</html>
